name: CD - build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Explicit image tag (default: commit SHA)'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: data-ingest-service
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
  CONTAINER_APP: ca-data-ingest-service
  CONTAINER_NAME: ca-data-ingest-service

jobs:
  build-and-deploy:
    name: data-ingest-service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR login server
        id: acr
        run: |
          login_server=$(az acr show --name "${{ vars.ACR_NAME }}" --query loginServer -o tsv)
          echo "login_server=$login_server" >> "$GITHUB_OUTPUT"

      - name: ACR docker login
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.acr.outputs.login_server }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ steps.acr.outputs.login_server }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=${{ env.IMAGE_NAME }}
          cache-to: type=gha,scope=${{ env.IMAGE_NAME }},mode=max

      - name: Update Container App image
        id: update_app_image
        run: |
          az containerapp update \
            --name "${{ env.CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --container-name "${{ env.CONTAINER_NAME }}" \
            --image "${{ steps.acr.outputs.login_server }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            --output none

          revision=$(az containerapp show \
            --name "${{ env.CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query "properties.latestRevisionName" -o tsv)

          if [ -z "$revision" ]; then
            echo "Could not resolve latest revision for ${{ env.CONTAINER_APP }}"
            exit 1
          fi

          echo "revision=$revision" >> "$GITHUB_OUTPUT"
          echo "Updated revision: $revision"

      - name: Wait for new revision to be healthy
        run: |
          revision="${{ steps.update_app_image.outputs.revision }}"

          for i in {1..30}; do
            state=$(az containerapp revision show \
              --name "${{ env.CONTAINER_APP }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --revision "$revision" \
              --query 'properties.runningState' -o tsv)

            echo "Attempt $i: runningState=$state"
            case "$state" in
              Running|RunningAtMaxScale) exit 0 ;;
              Failed|Degraded) exit 1 ;;
            esac
            sleep 10
          done

          echo "Revision did not reach Running within 5 minutes"
          exit 1
