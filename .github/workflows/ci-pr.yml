name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  maven-test:
    name: Maven verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Compile and test
        run: mvn -B -ntp verify

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build without push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: data-ingest-service:pr-${{ github.event.pull_request.number || github.run_number }}
          cache-from: type=gha,scope=data-ingest-service
          cache-to: type=gha,scope=data-ingest-service,mode=max
